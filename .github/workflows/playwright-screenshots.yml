name: Playwright Screenshots

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  capture-screenshots:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install deps
        run: |
          npm ci
          npx playwright install-deps
          npx playwright install
      - name: Build and start frontend preview
        run: |
          # Install frontend deps and build
          npm --prefix frontend ci
          npm --prefix frontend run build
          # Start a preview server in background and log output
          npm --prefix frontend run preview -- --port 5173 > frontend.log 2>&1 &
          # Wait for frontend ready
          for i in $(seq 1 60); do
            if curl -sSf http://127.0.0.1:5173/ || curl -sSf http://127.0.0.1:5173/dashboard > /dev/null; then
              echo "frontend ready"
              break
            fi
            echo "waiting for frontend... ($i)"
            sleep 1
          done
      - name: Start mock backend
        run: |
          npm run mock-backend > mock-backend.log 2>&1 &
          # Wait for readiness by polling the health endpoint
          for i in $(seq 1 30); do
            if curl -sSf http://127.0.0.1:8000/api/backtest/latest > /dev/null; then
              echo "mock-backend ready"
              break
            fi
            echo "waiting for mock-backend... ($i)"
            sleep 1
          done
      - name: Capture screenshots
        run: |
          cat frontend.log || true
          cat mock-backend.log || true
          npm run screenshot:ci

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playright-logs
          path: |
            **/mock-backend.log
            **/frontend.log

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        with:
          name: backtest-ui-screenshots
          path: tests/screenshots/
